<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
    body {
        margin: 0;
        background: black;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    a {
        color: white;
        font-size: 30px;
        text-decoration: none;
        opacity: 0;
        animation: spawn 2s ease forwards;
    }

    a:hover {
        text-decoration: underline;
    }

    @keyframes spawn {
        from {
            opacity: 0;
            transform: scale(0.8);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

</head>

<body>

<a href="https://www.roblox.com/users/6087145797/profile">
    https://www.roblox.com/users/6087145797/profile
</a>

</body>
</html>
